<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Rays -->
  <g stroke="white" stroke-width="5" stroke-linecap="round">
    <!-- Top -->
    <line x1="100" y1="18" x2="100" y2="2"/>
    <!-- Top-right 1 -->
    <line x1="122" y1="22" x2="132" y2="8"/>
    <!-- Top-right 2 -->
    <line x1="141" y1="34" x2="155" y2="24"/>
    <!-- Right -->
    <line x1="154" y1="52" x2="170" y2="46"/>
    <!-- Right-low -->
    <line x1="160" y1="72" x2="177" y2="70"/>
    <!-- Top-left 1 -->
    <line x1="78" y1="22" x2="68" y2="8"/>
    <!-- Top-left 2 -->
    <line x1="59" y1="34" x2="45" y2="24"/>
    <!-- Left -->
    <line x1="46" y1="52" x2="30" y2="46"/>
    <!-- Left-low -->
    <line x1="40" y1="72" x2="23" y2="70"/>
  </g>
  <!-- Pin shape -->
  <path
    d="M100 40
       C78 40 60 58 60 80
       C60 102 100 158 100 158
       C100 158 140 102 140 80
       C140 58 122 40 100 40Z"
    stroke="white"
    stroke-width="10"
    fill="none"
    stroke-linejoin="round"
  />
  <!-- Inner hole -->
  <circle cx="100" cy="78" r="18" stroke="white" stroke-width="10" fill="none"/>
</svg>
